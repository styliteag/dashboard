# Development compose. Backend and frontend run as separate containers,
# both with their src/ bind-mounted from the host so saving a file triggers
# uvicorn --reload (backend) or Vite HMR (frontend).
#
# Quickstart:
#   cp .env.example .env   # set DASH_MASTER_KEY (just gen-key), DASH_ADMIN_PASSWORD
#   docker compose -f compose-dev.yml up --build
#
# Browse: http://localhost:5173 (frontend, proxies /api to backend)
# Direct: http://localhost:8000/api/health (backend)

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootdev}
      MYSQL_DATABASE: ${DB_NAME:-dash}
      MYSQL_USER: ${DB_USER:-dash}
      MYSQL_PASSWORD: ${DB_PASSWORD:-devpassword}
      TZ: ${TZ:-UTC}
    ports:
      - "${DASH_DB_PORT:-3306}:3306"
    volumes:
      - dev_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      DASH_ENV: dev
      DASH_LOG_LEVEL: ${DASH_LOG_LEVEL:-debug}
      DASH_LOG_FORMAT: ${DASH_LOG_FORMAT:-console}
      # Vite proxies /api without adding X-Forwarded-For, so trust no hops in dev.
      # Dev default 0 (never trust XFF). In prod this must match actual proxies.
      DASH_TRUSTED_PROXY_HOPS: ${DASH_TRUSTED_PROXY_HOPS:-0}
      DASH_DATABASE_URL: mysql+aiomysql://${DB_USER:-dash}:${DB_PASSWORD:-devpassword}@db:3306/${DB_NAME:-dash}
      DASH_MASTER_KEY: ${DASH_MASTER_KEY:?set in .env}
      DASH_ADMIN_PASSWORD: ${DASH_ADMIN_PASSWORD:-admin}
      DASH_ADMIN_DISABLED: ${DASH_ADMIN_DISABLED:-auto}
      DASH_MFA_ISSUER: ${DASH_MFA_ISSUER:-Orbit Dashboard}
      # Dev: browser is at localhost:5173 (Vite proxies /api), so rp_id=localhost.
      DASH_WEBAUTHN_RP_ID: ${DASH_WEBAUTHN_RP_ID:-localhost}
      DASH_WEBAUTHN_ORIGIN: ${DASH_WEBAUTHN_ORIGIN:-http://localhost:5173}
      DASH_WEBAUTHN_RP_NAME: ${DASH_WEBAUTHN_RP_NAME:-Orbit Dashboard}
      DASH_POLL_INTERVAL_SECONDS: ${DASH_POLL_INTERVAL_SECONDS:-30}
      DASH_POLL_TICK_SECONDS: ${DASH_POLL_TICK_SECONDS:-10}
      DASH_PUSH_INTERVAL_SECONDS: ${DASH_PUSH_INTERVAL_SECONDS:-30}
      DASH_POLL_CONCURRENCY: ${DASH_POLL_CONCURRENCY:-20}
      DASH_AGENT_STALE_SECONDS: ${DASH_AGENT_STALE_SECONDS:-120}
      DASH_METRICS_RETENTION_DAYS: ${DASH_METRICS_RETENTION_DAYS:-30}
      DASH_IPSEC_EVENT_RETENTION_DAYS: ${DASH_IPSEC_EVENT_RETENTION_DAYS:-90}
      DASH_NOTIFY_WEBHOOK_URL: ${DASH_NOTIFY_WEBHOOK_URL:-}
      DASH_NOTIFY_TELEGRAM_TOKEN: ${DASH_NOTIFY_TELEGRAM_TOKEN:-}
      DASH_NOTIFY_TELEGRAM_CHAT_ID: ${DASH_NOTIFY_TELEGRAM_CHAT_ID:-}
      DASH_NOTIFY_NTFY_URL: ${DASH_NOTIFY_NTFY_URL:-}
      DASH_NOTIFY_MATTERMOST_URL: ${DASH_NOTIFY_MATTERMOST_URL:-}
      # GUI proxy (on in dev — Caddy fronts it per-port; see docker/Caddyfile.dev).
      DASH_GUI_PROXY_ENABLED: ${DASH_GUI_PROXY_ENABLED:-true}
      DASH_GUI_IDLE_MINUTES: ${DASH_GUI_IDLE_MINUTES:-15}
      TZ: ${TZ:-UTC}
    ports:
      - "${DASH_BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini:ro
      - ./backend/pyproject.toml:/app/pyproject.toml:ro
      - ./VERSION:/app/VERSION:ro
      - ./agent:/app/agent:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_BACKEND_URL: http://backend:8000
      TZ: ${TZ:-UTC}
    ports:
      - "${DASH_FRONTEND_PORT:-5173}:5173"
    volumes:
      # Bind the whole frontend dir so Vite sees config + src + index.html.
      # Anonymous volume on node_modules prevents the empty host dir from
      # shadowing the container's installed deps.
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # GUI proxy: terminates TLS per-instance-port and reverse-proxies to the
  # in-container tunnel forwarder (backend:14444). Prod swaps the port vhost for a
  # wildcard subdomain. See docker/Caddyfile.dev and §18.
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "9001-9010:9001-9010"
    volumes:
      - ./docker/Caddyfile.dev:/etc/caddy/Caddyfile:ro
    depends_on:
      - backend

volumes:
  dev_db_data:
