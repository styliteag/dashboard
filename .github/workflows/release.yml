name: Release

on:
  push:
    tags:
      - '*.*.*'
  # Manual re-run for an existing tag (e.g. after fixing missing secrets).
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build (e.g. 0.1.1)"
        required: true

env:
  GHCR_IMAGE: ghcr.io/styliteag/dashboard
  DOCKERHUB_IMAGE: docker.io/styliteag/dashboard
  # Separate package so the retention prune below never touches the cache.
  CACHE_IMAGE: ghcr.io/styliteag/dashboard-cache

jobs:
  # Single amd64 build, tagged and released in one job. There is no per-arch
  # matrix and no merge job any more: multi-arch (amd64 + arm64) is produced
  # LOCALLY with `just publish` (build-and-push.sh), because the native arm64
  # GitHub runner is billed per minute. CI builds amd64 only, so the image it
  # pushes IS the final manifest — nothing to assemble from digests.
  #
  # CAVEAT (same one build-and-push.sh documents): a single-arch push overwrites
  # the tag, it does not merge. Do not let this CI run and `just publish all`
  # both land on the same version tag — whichever runs last wins and the other
  # arch drops out. Pick one path per release.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      packages: write # push the image + prune old versions
    env:
      # Secrets are not directly addressable in `if:` expressions.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag list for the build push: GHCR always, Docker Hub only when its
      # secret is set. build-push-action pushes the image to every tag in one
      # go, so no imagetools copy step is needed.
      - name: Compute tags
        id: tags
        run: |
          V="${{ steps.version.outputs.version }}"
          TAGS="${GHCR_IMAGE}:${V},${GHCR_IMAGE}:latest"
          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            TAGS="${TAGS},${DOCKERHUB_IMAGE}:${V},${DOCKERHUB_IMAGE}:latest"
          else
            echo "::notice::DOCKERHUB_USERNAME secret is not set — pushing to GHCR only."
            echo "::notice::Add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repo secrets to enable Docker Hub."
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      # Build context is the repo root: orbit/Dockerfile copies VERSION and
      # agent/ from there and reads the version out of the file, not a build-arg.
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./orbit/Dockerfile
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Registry cache for the deps layer. It was removed for one release
          # (4.2.1) to measure the effect, and that run exposed why it belongs:
          # `mix deps.get` downloads from hex.pm, which swings 16s–37s run to
          # run purely on network speed. The cache replaces that variable cost
          # with a stable ~17s layer pull. mode=max also carries the Dockerfile's
          # hex mount-cache across runners. ignore-error: the cache is an
          # optimisation and must never fail a release that already built a good
          # image.
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:amd64
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }}:amd64,mode=max,ignore-error=true

      # Retention. Targets the `dashboard` package only — the build cache lives
      # in its own CACHE_IMAGE package, out of reach of this prune (pruning it
      # would force a cold rebuild).
      # NOTE: this is the one action still on node20 — actions/delete-package-
      # versions has had no release since v5.0.0 (Jan 2024) and no node24 line
      # exists, so it keeps emitting the deprecation warning. Bumping cannot fix
      # it; replacing it means hand-rolling a `gh api` delete loop against the
      # package registry, which is irreversible if the query is wrong. Left as
      # is deliberately (it is already continue-on-error).
      - name: Delete old GHCR package versions
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: "dashboard"
          package-type: "container"
          min-versions-to-keep: 30
          delete-only-untagged-versions: false

      - name: Extract release notes from CHANGELOG
        id: release_notes
        run: |
          python3 << 'EOF' > /tmp/release_notes.md
          import re

          version = "${{ steps.version.outputs.version }}"

          with open('CHANGELOG.md', 'r') as f:
              content = f.read()

          version_escaped = re.escape(version)
          pattern = rf'^## \[{version_escaped}\][^\n]*\n(.*?)(?=^## \[|\Z)'

          match = re.search(pattern, content, re.MULTILINE | re.DOTALL)

          if match:
              notes = match.group(0).strip()
              notes = re.sub(rf'^## \[{version_escaped}\][^\n]*\n', '', notes).strip()
              if notes:
                  print(notes)
              else:
                  print(f"Release {version}")
          else:
              print(f"Release {version}")
          EOF

          echo "notes<<RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
          cat /tmp/release_notes.md >> $GITHUB_OUTPUT
          echo "RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: ${{ steps.release_notes.outputs.notes }}
          generate_release_notes: false
