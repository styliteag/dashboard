name: Release

on:
  push:
    tags:
      - '*.*.*'
  # Manual re-run for an existing tag (e.g. after fixing missing secrets).
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build (e.g. 0.1.1)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      # Promoted to env so we can gate Docker-Hub steps with `if: env.X != ''`.
      # Secrets aren't directly addressable in `if:` expressions.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- GHCR (always available via GITHUB_TOKEN) ---

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/styliteag/dashboard:${{ steps.version.outputs.version }}
            ghcr.io/styliteag/dashboard:latest
          provenance: false
          sbom: false
          cache-from: type=registry,ref=ghcr.io/styliteag/dashboard:buildcache
          cache-to: type=registry,ref=ghcr.io/styliteag/dashboard:buildcache,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Delete old GHCR package versions
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: "dashboard"
          package-type: "container"
          min-versions-to-keep: 5
          delete-only-untagged-versions: false

      # --- Docker Hub (only if secrets are configured) ---

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/styliteag/dashboard:${{ steps.version.outputs.version }}
            docker.io/styliteag/dashboard:latest
          provenance: false
          sbom: false
          cache-from: type=registry,ref=docker.io/styliteag/dashboard:buildcache
          cache-to: type=registry,ref=docker.io/styliteag/dashboard:buildcache,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Note Docker Hub skipped
        if: env.DOCKERHUB_USERNAME == ''
        run: |
          echo "::notice::DOCKERHUB_USERNAME secret is not set — skipping Docker Hub push."
          echo "::notice::Add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repo secrets to enable."

      # --- GitHub Release ---

      - name: Extract release notes from CHANGELOG
        id: release_notes
        run: |
          python3 << 'EOF' > /tmp/release_notes.md
          import re

          version = "${{ steps.version.outputs.version }}"

          with open('CHANGELOG.md', 'r') as f:
              content = f.read()

          version_escaped = re.escape(version)
          pattern = rf'^## \[{version_escaped}\][^\n]*\n(.*?)(?=^## \[|\Z)'

          match = re.search(pattern, content, re.MULTILINE | re.DOTALL)

          if match:
              notes = match.group(0).strip()
              notes = re.sub(rf'^## \[{version_escaped}\][^\n]*\n', '', notes).strip()
              if notes:
                  print(notes)
              else:
                  print(f"Release {version}")
          else:
              print(f"Release {version}")
          EOF

          echo "notes<<RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
          cat /tmp/release_notes.md >> $GITHUB_OUTPUT
          echo "RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: ${{ steps.release_notes.outputs.notes }}
          generate_release_notes: false
