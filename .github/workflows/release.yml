name: Release

on:
  push:
    tags:
      - '*.*.*'
  # Manual re-run for an existing tag (e.g. after fixing missing secrets).
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build (e.g. 0.1.1)"
        required: true

env:
  GHCR_IMAGE: ghcr.io/styliteag/dashboard
  DOCKERHUB_IMAGE: docker.io/styliteag/dashboard
  # Separate package so the "delete old versions" step never prunes the cache.
  CACHE_IMAGE: ghcr.io/styliteag/dashboard-cache

jobs:
  # Build each architecture on a NATIVE runner (no QEMU emulation) and push the
  # resulting image by digest. Measured on 4.0.2/4.0.3: the same
  # `mix deps.compile` step took 413s under emulated arm64 versus 59s on native
  # amd64, and the whole release took ~12 min. Native runners remove that gap.
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          # arm64 disabled: the native `ubuntu-24.04-arm` runner is BILLED per
          # minute on private repos (kostet €). The Mac dev boxes build their
          # own arm64 image from compose.yml's `build:` block, so nothing pulls
          # arm64 from the registry today. Re-enable if arm64 servers appear —
          # the merge job already handles multiple digests, so just uncomment.
          # Do NOT add arm64 back to a single amd64 runner without this matrix:
          # that silently falls back to QEMU emulation (~10 min extra).
          # - platform: linux/arm64
          #   arch: arm64
          #   runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # No version extraction here: orbit/Dockerfile reads VERSION from the file
      # it copies out of the build context, so this job needs no version input.
      # The merge job below does the tagging and extracts it there.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build context is the repo root: orbit/Dockerfile copies VERSION and
      # agent/ from there and reads the version out of the file, not a build-arg.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./orbit/Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          # Per-arch registry cache in a dedicated package. Survives across runs
          # (no 10 GB GHA-cache limit); combined with copying VERSION *after*
          # mix deps.compile, a version-only bump reuses the dependency layer.
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:${{ matrix.arch }}
          # compression=zstd was tried and reverted: on the first run that
          # imported a zstd cache (4.2.0), pulling the cached deps layer back
          # took ~26s versus ~14s for gzip, and that run was the slowest of the
          # batch at 3m5s against 1m44s. zstd made the cache SLOWER to restore
          # here, so the default (gzip) stays.
          # ignore-error is kept: a cache export is an optimisation and must
          # never fail a release that already produced and pushed a good image.
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }}:${{ matrix.arch }},mode=max,ignore-error=true
          outputs: type=image,name=${{ env.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the per-arch digests into a multi-arch manifest list, tag it, and
  # cut the GitHub Release. Runs once, after every build finishes.
  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      # Secrets are not directly addressable in `if:` expressions.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create GHCR manifest list
        working-directory: /tmp/digests
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker buildx imagetools create \
            -t "${GHCR_IMAGE}:${VERSION}" \
            -t "${GHCR_IMAGE}:latest" \
            $(printf "${GHCR_IMAGE}@sha256:%s " *)
          docker buildx imagetools inspect "${GHCR_IMAGE}:${VERSION}"

      - name: Create Docker Hub manifest list
        if: env.DOCKERHUB_USERNAME != ''
        working-directory: /tmp/digests
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # imagetools copies the per-arch blobs from GHCR into Docker Hub.
          docker buildx imagetools create \
            -t "${DOCKERHUB_IMAGE}:${VERSION}" \
            -t "${DOCKERHUB_IMAGE}:latest" \
            $(printf "${GHCR_IMAGE}@sha256:%s " *)

      # Retention. A "version" here is a manifest, not a release: each release
      # adds the per-arch image pushed by digest (untagged) plus the manifest
      # list carrying the version tag and latest. The buildcache lives in its
      # own package (CACHE_IMAGE) and is deliberately out of reach of this step
      # — pruning it would silently cost a full cold rebuild.
      # NOTE: this is the one action still on node20 — actions/delete-package-
      # versions has had no release since v5.0.0 (Jan 2024) and no node24 line
      # exists, so it keeps emitting the deprecation warning. Bumping cannot fix
      # it; replacing it means hand-rolling a `gh api` delete loop against the
      # package registry, which is irreversible if the query is wrong. Left as
      # is deliberately (it is already continue-on-error).
      - name: Delete old GHCR package versions
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: "dashboard"
          package-type: "container"
          min-versions-to-keep: 30
          delete-only-untagged-versions: false

      - name: Note Docker Hub skipped
        if: env.DOCKERHUB_USERNAME == ''
        run: |
          echo "::notice::DOCKERHUB_USERNAME secret is not set — skipping Docker Hub push."
          echo "::notice::Add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repo secrets to enable."

      - name: Extract release notes from CHANGELOG
        id: release_notes
        run: |
          python3 << 'EOF' > /tmp/release_notes.md
          import re

          version = "${{ steps.version.outputs.version }}"

          with open('CHANGELOG.md', 'r') as f:
              content = f.read()

          version_escaped = re.escape(version)
          pattern = rf'^## \[{version_escaped}\][^\n]*\n(.*?)(?=^## \[|\Z)'

          match = re.search(pattern, content, re.MULTILINE | re.DOTALL)

          if match:
              notes = match.group(0).strip()
              notes = re.sub(rf'^## \[{version_escaped}\][^\n]*\n', '', notes).strip()
              if notes:
                  print(notes)
              else:
                  print(f"Release {version}")
          else:
              print(f"Release {version}")
          EOF

          echo "notes<<RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
          cat /tmp/release_notes.md >> $GITHUB_OUTPUT
          echo "RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: ${{ steps.release_notes.outputs.notes }}
          generate_release_notes: false
