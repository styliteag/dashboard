# Production-leaning compose. For local dev you can also use this; the frontend
# is built and served by nginx behind Caddy. Caddy terminates TLS (or serves
# plain HTTP on :80 if no domain is set).
#
# Quickstart:
#   cp deploy/.env.example deploy/.env
#   # edit deploy/.env (set DASH_MASTER_KEY, DASH_ADMIN_PASSWORD, POSTGRES_PASSWORD)
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-dash}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-dash} -d $${POSTGRES_DB:-dash}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DASH_ENV: ${DASH_ENV:-prod}
      DASH_LOG_LEVEL: ${DASH_LOG_LEVEL:-info}
      DASH_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dash}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-dash}
      DASH_MASTER_KEY: ${DASH_MASTER_KEY:?set in .env}
      DASH_ADMIN_PASSWORD: ${DASH_ADMIN_PASSWORD:?set in .env}
      DASH_POLL_INTERVAL_SECONDS: ${DASH_POLL_INTERVAL_SECONDS:-30}
      DASH_POLL_CONCURRENCY: ${DASH_POLL_CONCURRENCY:-20}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DASH_DOMAIN: ${DASH_DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
  caddy_data:
  caddy_config:
