# CUTOVER vhost: nginx stops
# serving the react bundle and proxies EVERYTHING to the orbit release
# (service name `orbit`, port 4000). Agents reconnect on their own — the
# /api/ws/ URL is unchanged. Rollback = restore docker/nginx.conf (the
# python vhost) and restart the app container; the python stack stays warm.
#
# Swap by mounting this file over the app container's vhost:
#   app:
#     volumes:
#       - ./docker/nginx.orbit.conf:/etc/nginx/conf.d/default.conf:ro
# then: docker compose --profile orbit up -d orbit && docker compose restart app

server {
    listen 80;
    server_name _;

    # Security headers (parity with the python vhost).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Agent + client websockets (unchanged URL — the agent fleet's contract).
    location /api/ws/ {
        proxy_pass http://orbit:4000/api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # LiveView socket (browser UI transport).
    location /live/ {
        proxy_pass http://orbit:4000/live/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else: server-rendered UI, /api, static release assets.
    location / {
        proxy_pass http://orbit:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
