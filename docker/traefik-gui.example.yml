# Traefik dynamic config for the OPTIONAL firewall GUI proxy (§18). Mount this as a
# Traefik file-provider config. It fronts the dashboard's per-instance GUI
# forwarders with a wildcard-subdomain origin + the auth gate.
#
# Prereqs:
#   - DASH_GUI_PROXY_ENABLED=true and DASH_GUI_BASE_TEMPLATE=https://gui-{id}.example.com
#   - `app` (the combined dashboard container) is on Traefik's network.
#   - A wildcard cert for *.gui.example.com (DNS-01 cert resolver).
#
# How it maps: the dashboard runs a raw-TCP forwarder per opened instance on
# app:14400+id (HTTPS to the firewall, self-signed). For each firewall you expose,
# add a router + service below (id 3 + 4 shown). The auth middleware + transport are
# shared. For many/dynamic firewalls, generate this file (or use Traefik's HTTP
# provider pointed at a dashboard endpoint) instead of editing by hand.

http:
  middlewares:
    # Gate every GUI request on the orbit_gui cookie. The dashboard derives the
    # instance from X-Forwarded-Host (gui-<id>), so ONE middleware serves all.
    gui-auth:
      forwardAuth:
        address: "http://app:80/api/gui/authcheck"

  routers:
    # --- instance 3 -----------------------------------------------------------
    # Token handoff + authcheck go to the app (backend), NOT the forwarder.
    gui-3-orbit:
      rule: "Host(`gui-3.example.com`) && PathPrefix(`/__orbit`)"
      priority: 100
      service: app-web
      tls:
        certResolver: letsencrypt
    # Everything else: gate on the cookie, then proxy to instance 3's forwarder.
    gui-3:
      rule: "Host(`gui-3.example.com`)"
      service: gui-3-fwd
      middlewares: [gui-auth]
      tls:
        certResolver: letsencrypt

    # --- instance 4 -----------------------------------------------------------
    gui-4-orbit:
      rule: "Host(`gui-4.example.com`) && PathPrefix(`/__orbit`)"
      priority: 100
      service: app-web
      tls:
        certResolver: letsencrypt
    gui-4:
      rule: "Host(`gui-4.example.com`)"
      service: gui-4-fwd
      middlewares: [gui-auth]
      tls:
        certResolver: letsencrypt

  services:
    app-web:
      loadBalancer:
        servers:
          - url: "http://app:80"
    gui-3-fwd:
      loadBalancer:
        serversTransport: gui-insecure
        servers:
          - url: "https://app:14403" # 14400 + instance id
    gui-4-fwd:
      loadBalancer:
        serversTransport: gui-insecure
        servers:
          - url: "https://app:14404"

  serversTransports:
    # The forwarder speaks the firewall's own (self-signed) TLS through the tunnel.
    gui-insecure:
      insecureSkipVerify: true
