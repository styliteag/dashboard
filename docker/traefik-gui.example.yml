# Example config for your EXTERNAL Traefik to expose the optional firewall GUI
# proxy. Traefik does only two things here: terminate TLS for the wildcard and
# forward everything to orbit (over HTTP). Orbit itself does the per-firewall
# host-matching (gui-<slug>), the auth gate and the tunnel proxying, in
# OrbitWeb.GuiProxy — so Traefik needs NO per-instance config, and there is no
# proxy sidecar to run. See README "Firewall GUI proxy" and §18.
#
# This is the FILE-PROVIDER form (load it via Traefik's file provider). With the
# Docker/Swarm provider, express the same router as labels on the orbit service.
#
# Prereqs: orbit reachable on Traefik's network, a wildcard cert for
# *.gui.example.com (DNS-01), and the dashboard set with
# DASH_GUI_PROXY_ENABLED=true and
# DASH_GUI_BASE_TEMPLATE=https://gui-{slug}.gui.example.com.

http:
  routers:
    orbit-gui:
      # Traefik v2 HostRegexp: a named group {name:regexp}, literal text outside it,
      # no ^$ anchors (the whole host is matched). Covers every gui-<slug> subdomain.
      rule: "HostRegexp(`{subdomain:gui-[a-z0-9-]+}.gui.example.com`)"
      # Traefik v3 instead uses a raw Go regexp (anchored, no named group):
      #   rule: "HostRegexp(`^gui-[a-z0-9-]+\\.gui\\.example\\.com$`)"
      service: orbit-gui
      tls:
        certResolver: letsencrypt        # DNS-01 wildcard for *.gui.example.com
        domains:
          - main: "gui.example.com"
            sans: ["*.gui.example.com"]

  services:
    orbit-gui:
      loadBalancer:
        # Orbit's own port. Traefik must be able to resolve it — attach orbit to
        # Traefik's docker network, or use its IP:4000.
        servers:
          - url: "http://orbit:4000"
        # Pass the original Host through: it is what orbit host-matches on. Without
        # this, every GUI origin collapses to the app's own host and the proxy never
        # engages. Traefik also sets X-Forwarded-Proto, which orbit reads to mark the
        # GUI cookie Secure (it speaks plain HTTP to orbit behind your TLS).
        passHostHeader: true
