# Production compose. Single combined image for frontend + backend.
#
# Quickstart:
#   cp .env.example .env
#   # edit .env (set DASH_MASTER_KEY, DASH_ADMIN_PASSWORD, POSTGRES_PASSWORD)
#   docker compose up -d --build
#
# To pull a prebuilt image instead of building locally, comment out the
# `build:` block under `app` and uncomment the `image:` line.

services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-dash}
      TZ: ${TZ:-UTC}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-dash} -d $${POSTGRES_DB:-dash}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    # Alternatively pull a prebuilt image:
    # image: styliteag/dashboard:latest
    # image: ghcr.io/styliteag/dashboard:latest
    restart: unless-stopped
    ports:
      - "${DASH_PORT:-80}:80"
    volumes:
      # Bake-vs-mount: prod uses the VERSION baked into the image; this bind
      # only matters for dev-style runs where the host VERSION drifts.
      - ./VERSION:/app/VERSION:ro
    environment:
      DASH_ENV: ${DASH_ENV:-prod}
      DASH_LOG_LEVEL: ${DASH_LOG_LEVEL:-info}
      DASH_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dash}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-dash}
      DASH_MASTER_KEY: ${DASH_MASTER_KEY:?set in .env}
      DASH_ADMIN_PASSWORD: ${DASH_ADMIN_PASSWORD:?set in .env}
      DASH_POLL_INTERVAL_SECONDS: ${DASH_POLL_INTERVAL_SECONDS:-30}
      DASH_POLL_CONCURRENCY: ${DASH_POLL_CONCURRENCY:-20}
      DASH_NOTIFY_WEBHOOK_URL: ${DASH_NOTIFY_WEBHOOK_URL:-}
      DASH_NOTIFY_TELEGRAM_TOKEN: ${DASH_NOTIFY_TELEGRAM_TOKEN:-}
      DASH_NOTIFY_TELEGRAM_CHAT_ID: ${DASH_NOTIFY_TELEGRAM_CHAT_ID:-}
      DASH_NOTIFY_NTFY_URL: ${DASH_NOTIFY_NTFY_URL:-}
      TZ: ${TZ:-UTC}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Nightly pg_dump backup. Dumps land in the db_backups volume; 7-day retention.
  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        while true; do
          sleep 86400
          STAMP=$$(date +%Y%m%d_%H%M%S)
          echo "[backup] starting $$STAMP"
          PGPASSWORD=$$POSTGRES_PASSWORD pg_dump -h db -U $${POSTGRES_USER:-dash} $${POSTGRES_DB:-dash} \
            | gzip > /backups/dump_$$STAMP.sql.gz
          echo "[backup] done $$STAMP"
          find /backups -name 'dump_*.sql.gz' -mtime +7 -delete
        done
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-dash}
    volumes:
      - db_backups:/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  db_backups:
