# Production compose. Single combined image for frontend + backend.
#
# Quickstart:
#   cp .env.example .env
#   # edit .env (set DASH_MASTER_KEY, DASH_ADMIN_PASSWORD, DB_PASSWORD)
#   docker compose up -d --build
#
# To pull a prebuilt image instead of building locally, comment out the
# `build:` block under `app` and uncomment the `image:` line.

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set in .env}
      MYSQL_DATABASE: ${DB_NAME:-dash}
      MYSQL_USER: ${DB_USER:-dash}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set in .env}
      TZ: ${TZ:-UTC}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    # Alternatively pull a prebuilt image:
    # image: styliteag/dashboard:latest
    # image: ghcr.io/styliteag/dashboard:latest
    restart: unless-stopped
    ports:
      - "${DASH_PORT:-80}:80"
    volumes:
      # Bake-vs-mount: prod uses the VERSION baked into the image; this bind
      # only matters for dev-style runs where the host VERSION drifts.
      - ./VERSION:/app/VERSION:ro
    environment:
      DASH_ENV: ${DASH_ENV:-prod}
      DASH_LOG_LEVEL: ${DASH_LOG_LEVEL:-info}
      DASH_LOG_FORMAT: ${DASH_LOG_FORMAT:-console}
      # Trust exactly this many rightmost X-Forwarded-For entries (nginx in the image).
      # Too high = clients can spoof IPs for login rate limits and audit.
      # See .env.example. The app refuses to boot in non-dev if > 3.
      DASH_TRUSTED_PROXY_HOPS: ${DASH_TRUSTED_PROXY_HOPS:-1}
      DASH_DATABASE_URL: mysql+aiomysql://${DB_USER:-dash}:${DB_PASSWORD}@db:3306/${DB_NAME:-dash}
      DASH_MASTER_KEY: ${DASH_MASTER_KEY:?set in .env}
      DASH_ADMIN_PASSWORD: ${DASH_ADMIN_PASSWORD:?set in .env}
      # Bootstrap-admin lifecycle + 2FA. Passkeys REQUIRE WEBAUTHN_RP_ID/ORIGIN set
      # to your real domain — the localhost defaults make passkey registration fail
      # behind a reverse proxy (Traefik) with a browser SecurityError. Set
      # DASH_WEBAUTHN_RP_ID=dash.example.com and DASH_WEBAUTHN_ORIGIN=https://dash.example.com
      # (exact https origin, no trailing slash). TOTP works regardless.
      DASH_ADMIN_DISABLED: ${DASH_ADMIN_DISABLED:-auto}
      DASH_MFA_ISSUER: ${DASH_MFA_ISSUER:-Orbit Dashboard}
      DASH_WEBAUTHN_RP_ID: ${DASH_WEBAUTHN_RP_ID:-localhost}
      DASH_WEBAUTHN_ORIGIN: ${DASH_WEBAUTHN_ORIGIN:-http://localhost:5173}
      DASH_WEBAUTHN_RP_NAME: ${DASH_WEBAUTHN_RP_NAME:-Orbit Dashboard}
      DASH_POLL_INTERVAL_SECONDS: ${DASH_POLL_INTERVAL_SECONDS:-30}
      DASH_POLL_TICK_SECONDS: ${DASH_POLL_TICK_SECONDS:-10}
      DASH_PUSH_INTERVAL_SECONDS: ${DASH_PUSH_INTERVAL_SECONDS:-30}
      DASH_POLL_CONCURRENCY: ${DASH_POLL_CONCURRENCY:-20}
      DASH_AGENT_STALE_SECONDS: ${DASH_AGENT_STALE_SECONDS:-120}
      DASH_METRICS_RETENTION_DAYS: ${DASH_METRICS_RETENTION_DAYS:-30}
      DASH_IPSEC_EVENT_RETENTION_DAYS: ${DASH_IPSEC_EVENT_RETENTION_DAYS:-90}
      DASH_NOTIFY_WEBHOOK_URL: ${DASH_NOTIFY_WEBHOOK_URL:-}
      DASH_NOTIFY_TELEGRAM_TOKEN: ${DASH_NOTIFY_TELEGRAM_TOKEN:-}
      DASH_NOTIFY_TELEGRAM_CHAT_ID: ${DASH_NOTIFY_TELEGRAM_CHAT_ID:-}
      DASH_NOTIFY_NTFY_URL: ${DASH_NOTIFY_NTFY_URL:-}
      DASH_NOTIFY_MATTERMOST_URL: ${DASH_NOTIFY_MATTERMOST_URL:-}
      # Firewall GUI proxy (OPTIONAL — off by default). Needs the `gui-proxy`
      # service below + an external reverse proxy (e.g. Traefik) routing the
      # wildcard. See README "Firewall GUI proxy".
      DASH_GUI_PROXY_ENABLED: ${DASH_GUI_PROXY_ENABLED:-false}
      DASH_GUI_BASE_TEMPLATE: ${DASH_GUI_BASE_TEMPLATE:-}
      # Caddy admin endpoint the backend hot-loads the per-slug vhost map to
      # (reachable as gui-proxy:2019 on the internal compose network — NOT published
      # to the host). REQUIRED when the proxy is enabled — without it the push
      # silently no-ops and gui-<slug> hosts return a blank 200. The default below
      # only applies to THIS compose; a hand-written/Swarm stack must set it itself.
      DASH_GUI_CADDY_ADMIN_URL: ${DASH_GUI_CADDY_ADMIN_URL:-http://gui-proxy:2019/load}
      DASH_GUI_IDLE_MINUTES: ${DASH_GUI_IDLE_MINUTES:-15}
      TZ: ${TZ:-UTC}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Firewall GUI proxy (OPTIONAL). Your EXTERNAL Traefik terminates TLS and routes
  # Host(*.${ORBIT_GUI_DOMAIN}) to THIS Caddy (over HTTP); it host-matches gui-<slug>,
  # gates on the orbit_gui cookie (forward_auth), and proxies to that firewall's
  # forwarder (app:14400+id). Opt-in: `docker compose --profile gui up -d`.
  # The mounted Caddyfile is only a BOOTSTRAP (admin API + empty wildcard); the
  # backend regenerates the per-slug vhost map and hot-loads it via Caddy's admin
  # API (gui-proxy:2019) on every instance create/slug-change/delete and at startup.
  # Regenerate the bootstrap only if its global block changes:
  #   uv --project backend run python scripts/gen-gui-caddyfile.py > docker/Caddyfile.gui-prod
  # Wire your Traefik to reach it (shared network + a router *.<domain> → gui-proxy:80).
  # Two equivalent ways to add that router:
  #   A) file provider  — docker/traefik-gui.example.yml (dynamic config file)
  #   B) Traefik labels — the commented `deploy.labels` block below
  # Pick one, not both.
  gui-proxy:
    image: caddy:2
    restart: unless-stopped
    profiles: [gui]
    environment:
      ORBIT_GUI_DOMAIN: ${ORBIT_GUI_DOMAIN:?set this to your gui wildcard base, e.g. gui.example.com}
      ORBIT_GUI_APP: app:80
      ORBIT_GUI_FWD_HOST: app
    volumes:
      - ./docker/Caddyfile.gui-prod:/etc/caddy/Caddyfile:ro
    depends_on:
      - app
    # --- Option B: wire Traefik via LABELS (instead of the file provider in A). ---
    # Uncomment and replace `gui.example.com` with your ORBIT_GUI_DOMAIN. Traefik
    # only terminates TLS and forwards HTTP here; Caddy does the host-match + auth.
    #
    # WHERE THE LABELS GO depends on your Traefik provider:
    #   - Docker SWARM provider (`docker stack deploy`): keep them under `deploy.labels`
    #     as shown — the swarm provider reads ONLY `deploy.labels`.
    #   - Plain Docker provider (`docker compose up`): move them to a top-level
    #     `labels:` on this service — `deploy.labels` is ignored there.
    #
    # deploy:
    #   labels:
    #     - traefik.enable=true
    #     # Swarm can't infer the target port — declare it explicitly:
    #     - traefik.http.services.orbit-gui.loadbalancer.server.port=80
    #
    #     # HTTP: redirect every gui-<slug> host to HTTPS.
    #     # Rule shown in Traefik v2 syntax: HostRegexp uses a named group {name:regexp},
    #     # literal text outside it, no ^$ anchors. For Traefik v3 use a raw Go regexp:
    #     #   HostRegexp(`^gui-[a-z0-9-]+\.gui\.example\.com$`)
    #     - traefik.http.routers.orbit-gui-web.rule=HostRegexp(`{subdomain:gui-[a-z0-9-]+}.gui.example.com`)
    #     - traefik.http.routers.orbit-gui-web.entrypoints=web
    #     - traefik.http.routers.orbit-gui-web.middlewares=orbit-gui-redirect
    #     - traefik.http.middlewares.orbit-gui-redirect.redirectscheme.scheme=https
    #     - traefik.http.middlewares.orbit-gui-redirect.redirectscheme.permanent=true
    #
    #     # HTTPS: terminate TLS at Traefik, forward HTTP to this Caddy:80 (SAME rule).
    #     - traefik.http.routers.orbit-gui.rule=HostRegexp(`{subdomain:gui-[a-z0-9-]+}.gui.example.com`)
    #     - traefik.http.routers.orbit-gui.entrypoints=websecure
    #     - traefik.http.routers.orbit-gui.tls=true
    #     # If Traefik already serves a *.gui.example.com wildcard cert, `tls=true`
    #     # alone is enough (it's picked by SNI). Otherwise request one via DNS-01:
    #     #- traefik.http.routers.orbit-gui.tls.certresolver=letsencrypt
    #     #- traefik.http.routers.orbit-gui.tls.domains[0].main=gui.example.com
    #     #- traefik.http.routers.orbit-gui.tls.domains[0].sans=*.gui.example.com
    #
    #     # gui-proxy must share a network with Traefik. If it's attached to more
    #     # than one, tell Traefik which to use (else it may route to the wrong IP):
    #     #- traefik.docker.network=traefik

volumes:
  db_data:
