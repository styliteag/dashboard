# Production compose — Orbit (Elixir/LiveView) stack.
#
# This is the CUTOVER topology: the
# old FastAPI+React `app` image is gone; a thin nginx front door proxies
# everything to the `orbit` release (Bandit on :4000). Old and new never run
# side by side — one dashboard, one poller, one notifier.
#
# Quickstart:
#   cp .env.example .env
#   # edit .env: DASH_MASTER_KEY, ORBIT_SECRET_KEY_BASE, DB_PASSWORD,
#   #            DB_ROOT_PASSWORD, DASH_PUBLIC_HOST
#   docker compose up -d --build
#
# SCHEMA: orbit now OWNS the database schema (Ecto migrations, run at boot by
# Orbit.Repo.Migrator — no manual step):
#   - Empty/greenfield DB → the baseline migration creates the whole schema.
#   - Cutover from the python stack → the baseline is idempotent (CREATE TABLE
#     IF NOT EXISTS), so it adopts the already-migrated tables as a no-op and
#     just records the version. Accounts and data are untouched.
# Future schema changes are ordinary migrations in orbit/priv/repo/migrations/.
#
# To pull prebuilt images instead of building, comment the `build:` block under
# `orbit` and uncomment its `image:` line.

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set in .env}
      MYSQL_DATABASE: ${DB_NAME:-dash}
      MYSQL_USER: ${DB_USER:-dash}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set in .env}
      TZ: ${TZ:-UTC}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Orbit release (Elixir/LiveView) — the whole dashboard. Bandit listens on
  # :4000; the nginx service below is the only front door (no published ports
  # here). Config that used to be env-only now largely lives in DB settings, so
  # this block is smaller than the old `app` — only boot-time secrets, host
  # identity, the proxy-hop count and the GeoIP/CrowdSec/GUI switches remain.
  orbit:
    build:
      context: .
      dockerfile: orbit/Dockerfile
    # Alternatively pull a prebuilt image:
    # image: styliteag/dashboard-orbit:latest
    # image: ghcr.io/styliteag/dashboard-orbit:latest
    restart: unless-stopped
    volumes:
      # GeoLite2 database — volume-backed so the weekly download survives
      # container recreation (or drop your own mmdb in here manually). Orbit is
      # now the sole updater (GeoLite2-City); set the MaxMind creds below.
      - geoip_data:/data/geoip
    environment:
      # Same DB + Fernet key as the retired python stack — the schema and the
      # *_enc secret columns are shared/compatible.
      DASH_DATABASE_URL: mysql+aiomysql://${DB_USER:-dash}:${DB_PASSWORD}@db:3306/${DB_NAME:-dash}
      DASH_MASTER_KEY: ${DASH_MASTER_KEY:?set in .env}
      # Phoenix cookie/token signing base — generate with: openssl rand -base64 48
      SECRET_KEY_BASE: ${ORBIT_SECRET_KEY_BASE:?set in .env - openssl rand -base64 48}
      # Public host (address bar) — used for the URL, the LiveView origin check
      # and the passkey defaults below. Set to your real domain.
      PHX_HOST: ${DASH_PUBLIC_HOST:-localhost}
      POOL_SIZE: ${ORBIT_POOL_SIZE:-10}
      # Trust exactly this many rightmost X-Forwarded-For entries (the nginx
      # service adds one). Too high = clients can spoof the IP behind login rate
      # limits, the audit log and the geo gate. See .env.example.
      DASH_TRUSTED_PROXY_HOPS: ${DASH_TRUSTED_PROXY_HOPS:-1}
      # 2FA / passkeys. Passkeys REQUIRE the RP id + origin to match the real
      # host EXACTLY (localhost defaults make registration fail behind a proxy
      # with a browser SecurityError). TOTP works regardless.
      DASH_MFA_ISSUER: ${DASH_MFA_ISSUER:-Orbit Dashboard}
      DASH_WEBAUTHN_RP_ID: ${DASH_WEBAUTHN_RP_ID:-${DASH_PUBLIC_HOST:-localhost}}
      DASH_WEBAUTHN_ORIGIN: ${DASH_WEBAUTHN_ORIGIN:-https://${DASH_PUBLIC_HOST:-localhost}}
      DASH_WEBAUTHN_RP_NAME: ${DASH_WEBAUTHN_RP_NAME:-Orbit Dashboard}
      # Bootstrap-seed force flags (accounts already live in the shared DB; these
      # only govern the seed-admin retirement lifecycle).
      DASH_ADMIN_DISABLED: ${DASH_ADMIN_DISABLED:-auto}
      DASH_SUPERADMIN_DISABLED: ${DASH_SUPERADMIN_DISABLED:-auto}
      DASH_ADMIN_PASSWORD: ${DASH_ADMIN_PASSWORD:-}
      DASH_SUPERADMIN_PASSWORD: ${DASH_SUPERADMIN_PASSWORD:-}
      # Browser terminal (root shell on the firewall — docs §22). Global gate;
      # each instance additionally needs its per-instance "Terminal" opt-in.
      DASH_SHELL_ENABLED: ${DASH_SHELL_ENABLED:-false}
      # Extra allowed WS Origin hosts (comma-separated) beyond PHX_HOST/localhost.
      DASH_WS_ALLOWED_ORIGIN_HOSTS: ${DASH_WS_ALLOWED_ORIGIN_HOSTS:-}
      # GeoIP access restriction (docs/geoip-access-restriction.md).
      # DASH_GEOIP_DISABLE=true is the emergency kill switch when a bad
      # country/whitelist config locks everyone out (env-only by design).
      DASH_GEOIP_DISABLE: ${DASH_GEOIP_DISABLE:-false}
      DASH_MAXMIND_ACCOUNT_ID: ${DASH_MAXMIND_ACCOUNT_ID:-}
      DASH_MAXMIND_LICENSE_KEY: ${DASH_MAXMIND_LICENSE_KEY:-}
      DASH_GEOIP_DB_PATH: ${DASH_GEOIP_DB_PATH:-/data/geoip/GeoLite2-Country.mmdb}
      # CrowdSec blocklist (optional sidecar below, profile "crowdsec").
      DASH_CROWDSEC_DISABLE: ${DASH_CROWDSEC_DISABLE:-false}
      DASH_CROWDSEC_LAPI_URL: ${DASH_CROWDSEC_LAPI_URL:-http://crowdsec:8080}
      DASH_CROWDSEC_API_KEY: ${DASH_CROWDSEC_API_KEY:-}
      # Firewall GUI proxy (OPTIONAL — off by default). Needs the `gui-proxy`
      # service below + an external reverse proxy routing the wildcard. See
      # README "Firewall GUI proxy".
      DASH_GUI_PROXY_ENABLED: ${DASH_GUI_PROXY_ENABLED:-false}
      DASH_GUI_BASE_TEMPLATE: ${DASH_GUI_BASE_TEMPLATE:-}
      ORBIT_GUI_DOMAIN: ${ORBIT_GUI_DOMAIN:-}
      # Caddy admin endpoint orbit hot-loads the per-slug vhost map to
      # (gui-proxy:2019 on the internal network — NOT published). REQUIRED when
      # the proxy is enabled, else the push silently no-ops.
      DASH_GUI_CADDY_ADMIN_URL: ${DASH_GUI_CADDY_ADMIN_URL:-http://gui-proxy:2019/load}
      DASH_GUI_IDLE_MINUTES: ${DASH_GUI_IDLE_MINUTES:-15}
      TZ: ${TZ:-UTC}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # curl ships in the runner image for exactly this (debian-slim has no wget).
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4000/api/health-ex >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # The only front door: TLS terminates at your external reverse proxy / LB,
  # which forwards HTTP here; this nginx proxies the dashboard, /api and both
  # websockets (/api/ws for agents, /live for the browser) to orbit:4000.
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${DASH_PORT:-80}:80"
    volumes:
      - ./docker/nginx.orbit.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      orbit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/api/health-ex >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Firewall GUI proxy (OPTIONAL). Your EXTERNAL Traefik terminates TLS and routes
  # Host(*.${ORBIT_GUI_DOMAIN}) to THIS Caddy (over HTTP); it host-matches gui-<slug>,
  # gates on the orbit_gui cookie (forward_auth), and proxies to that firewall's
  # forwarder (orbit:14400+id). Opt-in: `docker compose --profile gui up -d`.
  # The mounted Caddyfile is only a BOOTSTRAP (admin API + empty wildcard); orbit
  # regenerates the per-slug vhost map and hot-loads it via Caddy's admin API
  # (gui-proxy:2019) on every instance create/slug-change/delete and at startup.
  # Regenerate the bootstrap only if its global block changes:
  #   docker compose -f compose-dev.yml run --rm orbit \
  #     mix run -e 'IO.puts Orbit.Gui.Caddy.bootstrap_caddyfile()' > docker/Caddyfile.gui-prod
  # Wire your Traefik to reach it (shared network + a router *.<domain> → gui-proxy:80).
  # Two equivalent ways to add that router:
  #   A) file provider  — docker/traefik-gui.example.yml (dynamic config file)
  #   B) Traefik labels — the commented `deploy.labels` block below
  # Pick one, not both.
  gui-proxy:
    image: caddy:2
    restart: unless-stopped
    profiles: [gui]
    environment:
      ORBIT_GUI_DOMAIN: ${ORBIT_GUI_DOMAIN:?set this to your gui wildcard base, e.g. gui.example.com}
      # authcheck subrequests + per-instance forwarders both live in the orbit
      # release now (was the python `app` container pre-cutover).
      ORBIT_GUI_APP: orbit:4000
      ORBIT_GUI_FWD_HOST: orbit
    volumes:
      - ./docker/Caddyfile.gui-prod:/etc/caddy/Caddyfile:ro
    depends_on:
      - orbit
    # --- Option B: wire Traefik via LABELS (instead of the file provider in A). ---
    # Uncomment and replace `gui.example.com` with your ORBIT_GUI_DOMAIN. Traefik
    # only terminates TLS and forwards HTTP here; Caddy does the host-match + auth.
    #
    # WHERE THE LABELS GO depends on your Traefik provider:
    #   - Docker SWARM provider (`docker stack deploy`): keep them under `deploy.labels`
    #     as shown — the swarm provider reads ONLY `deploy.labels`.
    #   - Plain Docker provider (`docker compose up`): move them to a top-level
    #     `labels:` on this service — `deploy.labels` is ignored there.
    #
    # deploy:
    #   labels:
    #     - traefik.enable=true
    #     # Swarm can't infer the target port — declare it explicitly:
    #     - traefik.http.services.orbit-gui.loadbalancer.server.port=80
    #
    #     # HTTP: redirect every gui-<slug> host to HTTPS.
    #     # Rule shown in Traefik v2 syntax: HostRegexp uses a named group {name:regexp},
    #     # literal text outside it, no ^$ anchors. For Traefik v3 use a raw Go regexp:
    #     #   HostRegexp(`^gui-[a-z0-9-]+\.gui\.example\.com$`)
    #     - traefik.http.routers.orbit-gui-web.rule=HostRegexp(`{subdomain:gui-[a-z0-9-]+}.gui.example.com`)
    #     - traefik.http.routers.orbit-gui-web.entrypoints=web
    #     - traefik.http.routers.orbit-gui-web.middlewares=orbit-gui-redirect
    #     - traefik.http.middlewares.orbit-gui-redirect.redirectscheme.scheme=https
    #     - traefik.http.middlewares.orbit-gui-redirect.redirectscheme.permanent=true
    #
    #     # HTTPS: terminate TLS at Traefik, forward HTTP to this Caddy:80 (SAME rule).
    #     - traefik.http.routers.orbit-gui.rule=HostRegexp(`{subdomain:gui-[a-z0-9-]+}.gui.example.com`)
    #     - traefik.http.routers.orbit-gui.entrypoints=websecure
    #     - traefik.http.routers.orbit-gui.tls=true
    #     # If Traefik already serves a *.gui.example.com wildcard cert, `tls=true`
    #     # alone is enough (it's picked by SNI). Otherwise request one via DNS-01:
    #     #- traefik.http.routers.orbit-gui.tls.certresolver=letsencrypt
    #     #- traefik.http.routers.orbit-gui.tls.domains[0].main=gui.example.com
    #     #- traefik.http.routers.orbit-gui.tls.domains[0].sans=*.gui.example.com
    #
    #     # gui-proxy must share a network with Traefik. If it's attached to more
    #     # than one, tell Traefik which to use (else it may route to the wrong IP):
    #     #- traefik.docker.network=traefik

  # CrowdSec LAPI sidecar (OPTIONAL, DR-G8). Opt-in: `docker compose --profile
  # crowdsec up -d`. Out of the box it serves the community blocklists (CAPI);
  # local log parsing can be added later via collections/acquis config in the
  # crowdsec_config volume. After first start mint the bouncer key:
  #   docker exec dashboard-crowdsec-1 cscli bouncers add orbit-dashboard
  # and put it into .env as DASH_CROWDSEC_API_KEY (key set = check active;
  # DASH_CROWDSEC_DISABLE=true switches it off without removing the key).
  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.7
    restart: unless-stopped
    profiles: [crowdsec]
    environment:
      COLLECTIONS: crowdsecurity/linux
    volumes:
      - crowdsec_config:/etc/crowdsec
      - crowdsec_data:/var/lib/crowdsec/data

volumes:
  db_data:
  geoip_data:
  crowdsec_config:
  crowdsec_data:
