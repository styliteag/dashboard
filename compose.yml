# Production compose. Single combined image for frontend + backend.
#
# Quickstart:
#   cp .env.example .env
#   # edit .env (set DASH_MASTER_KEY, DASH_ADMIN_PASSWORD, DB_PASSWORD)
#   docker compose up -d --build
#
# To pull a prebuilt image instead of building locally, comment out the
# `build:` block under `app` and uncomment the `image:` line.

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set in .env}
      MYSQL_DATABASE: ${DB_NAME:-dash}
      MYSQL_USER: ${DB_USER:-dash}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set in .env}
      TZ: ${TZ:-UTC}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    # Alternatively pull a prebuilt image:
    # image: styliteag/dashboard:latest
    # image: ghcr.io/styliteag/dashboard:latest
    restart: unless-stopped
    ports:
      - "${DASH_PORT:-80}:80"
    volumes:
      # Bake-vs-mount: prod uses the VERSION baked into the image; this bind
      # only matters for dev-style runs where the host VERSION drifts.
      - ./VERSION:/app/VERSION:ro
    environment:
      DASH_ENV: ${DASH_ENV:-prod}
      DASH_LOG_LEVEL: ${DASH_LOG_LEVEL:-info}
      DASH_DATABASE_URL: mysql+aiomysql://${DB_USER:-dash}:${DB_PASSWORD}@db:3306/${DB_NAME:-dash}
      DASH_MASTER_KEY: ${DASH_MASTER_KEY:?set in .env}
      DASH_ADMIN_PASSWORD: ${DASH_ADMIN_PASSWORD:?set in .env}
      DASH_POLL_INTERVAL_SECONDS: ${DASH_POLL_INTERVAL_SECONDS:-30}
      DASH_POLL_CONCURRENCY: ${DASH_POLL_CONCURRENCY:-20}
      DASH_NOTIFY_WEBHOOK_URL: ${DASH_NOTIFY_WEBHOOK_URL:-}
      DASH_NOTIFY_TELEGRAM_TOKEN: ${DASH_NOTIFY_TELEGRAM_TOKEN:-}
      DASH_NOTIFY_TELEGRAM_CHAT_ID: ${DASH_NOTIFY_TELEGRAM_CHAT_ID:-}
      DASH_NOTIFY_NTFY_URL: ${DASH_NOTIFY_NTFY_URL:-}
      # Firewall GUI proxy (OPTIONAL — off by default). Needs the `gui-proxy`
      # service below + an external reverse proxy (e.g. Traefik) routing the
      # wildcard. See README "Firewall GUI proxy".
      DASH_GUI_PROXY_ENABLED: ${DASH_GUI_PROXY_ENABLED:-false}
      DASH_GUI_BASE_TEMPLATE: ${DASH_GUI_BASE_TEMPLATE:-}
      DASH_GUI_IDLE_MINUTES: ${DASH_GUI_IDLE_MINUTES:-15}
      TZ: ${TZ:-UTC}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Firewall GUI proxy (OPTIONAL). Your EXTERNAL Traefik terminates TLS and routes
  # Host(*.${ORBIT_GUI_DOMAIN}) to THIS Caddy (over HTTP); it host-matches gui-<id>,
  # gates on the orbit_gui cookie (forward_auth), and proxies to that firewall's
  # forwarder (app:14400+id). Opt-in: `docker compose --profile gui up -d`.
  # The Caddyfile maps gui-1..gui-25 by default; for more firewalls regenerate it:
  #   python scripts/gen-gui-caddyfile.py <N> > docker/Caddyfile.gui-prod
  # Wire your Traefik to reach it (shared network + a router *.<domain> → gui-proxy:80);
  # see docker/traefik-gui.example.yml.
  gui-proxy:
    image: caddy:2
    restart: unless-stopped
    profiles: [gui]
    environment:
      ORBIT_GUI_DOMAIN: ${ORBIT_GUI_DOMAIN:?set this to your gui wildcard base, e.g. gui.example.com}
      ORBIT_GUI_APP: app:80
      ORBIT_GUI_FWD_HOST: app
    volumes:
      - ./docker/Caddyfile.gui-prod:/etc/caddy/Caddyfile:ro
    depends_on:
      - app

volumes:
  db_data:
